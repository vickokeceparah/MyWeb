<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JJ Video</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }
    a { color: #aaa; text-decoration: none; }
    table {
      margin: 20px auto;
      border-collapse: collapse;
    }
    td {
      padding: 10px;
    }
  </style>
</head>
<body>

  <p><a href="https://vickokeceparah.github.io/MyWeb/index.html">← Kembali</a></p>

  <!-- Tabel 1: Video original (horizontal / default) -->
  <table border="1">
    <tr>
      <td>
        <video
          width="480"
          autoplay
          loop
          controls
        >
          <source src="lv_7602971414290795781_20260522081043.mp4" type="video/mp4" />
          Browser kamu tidak mendukung video.
        </video>
      </td>
    </tr>
  </table>

  <!-- Tabel 2: Video berukuran 9:16 (portrait), autoplay dengan audio -->
  <table border="1">
    <tr>
      <td>
        <video
          width="270"
          height="480"
          autoplay
          loop
          controls
          style="object-fit: cover;"
        >
          <source src="lv_7602971414290795781_20260522081043.mp4" type="video/mp4" />
          Browser kamu tidak mendukung video.
        </video>
      </td>
    </tr>
  </table>

</body>
</html>
