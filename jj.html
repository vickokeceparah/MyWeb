<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JJ Video</title>

  <style>
    :root {
      --bg-dark: #1a0a0a;
      --bg-card: #2a0f0f;
      --red-primary: #8b1a1a;
      --red-accent: #c42b2b;
      --cream: #f5e6c8;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      background: var(--bg-dark);
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family: Arial, sans-serif;
      position:relative;
    }

    /* Background glow sama seperti web utama */
    body::before{
      content:'';
      position:absolute;
      top:-50%;
      right:-30%;
      width:80%;
      height:150%;
      background:
      radial-gradient(
        ellipse,
        rgba(139,26,26,0.35) 0%,
        transparent 70%
      );
      pointer-events:none;
    }

    .video-box{
      width:320px;
      aspect-ratio:3/4;
      border-radius:24px;
      overflow:hidden;
      border:2px solid rgba(196,43,43,0.4);
      box-shadow:
      0 0 40px rgba(196,43,43,0.25);
      background: var(--bg-card);
      position:relative;
      z-index:2;
    }

    .video-box video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    @media(max-width:500px){
      .video-box{
        width:90vw;
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">
    ← Kembali
  </a>

  <div class="video-box">
    <video autoplay controls loop playsinline>
      <source src="lv_7602971414290795781_20260522081043.mp4" type="video/mp4">
      Browser kamu tidak mendukung video.
    </video>
  </div>

</body>
</html>
